<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle in washi tone -->
  <circle cx="50" cy="50" r="48" fill="#fbf6ee"/>
  <!-- Five sakura petals around the center -->
  <g fill="#f4b6c2" stroke="#e89aa8" stroke-width="1.5">
    <ellipse cx="50" cy="24" rx="11" ry="18"/>
    <ellipse cx="50" cy="24" rx="11" ry="18" transform="rotate(72 50 50)"/>
    <ellipse cx="50" cy="24" rx="11" ry="18" transform="rotate(144 50 50)"/>
    <ellipse cx="50" cy="24" rx="11" ry="18" transform="rotate(216 50 50)"/>
    <ellipse cx="50" cy="24" rx="11" ry="18" transform="rotate(288 50 50)"/>
  </g>
  <!-- Yellow center -->
  <circle cx="50" cy="50" r="6" fill="#c9a96e"/>
</svg>